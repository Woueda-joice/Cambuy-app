<form action="/submit" method="POST">
    <input type="number" name="age" placeholder="Âge" required>

    <select name="sexe">
        <option>Homme</option>
        <option>Femme</option>
    </select>

    <input type="text" name="ville" placeholder="Ville">

    <select name="frequence">
        <option>Souvent</option>
        <option>Parfois</option>
        <option>Rarement</option>
    </select>

    <select name="preference">
        <option>En ligne</option>
        <option>Marché</option>
        <option>Les deux</option>
    </select>

    <select name="raison">
        <option>Prix</option>
        <option>Confiance</option>
        <option>Rapidité</option>
    </select>

    <select name="produit">
        <option value="">-- Choisir un type de produit --</option>
            <option>Alimentation</option>
            <option>Vêtements</option>
            <option>Électronique</option>
            <option>Beauté / Cosmétique</option>
            <option>Articles de maison</option>
            <option>Autres</option>
    </select>
    <input type="number" name="budget" placeholder="Ex: 5000" required>


    <button type="submit">Envoyer</button>
</form>
